<body>
    <script>
      // 致命的なエラーをキャッチして画面に表示するスクリプト
      window.onerror = function(msg, url, line, col, error) {
        var container = document.createElement('div');
        container.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; padding:20px; overflow:auto; color: #dc2626; font-family: monospace;';
        
        var title = document.createElement('h1');
        title.textContent = 'Application Error';
        title.style.cssText = 'font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #dc2626; padding-bottom: 10px;';
        
        var message = document.createElement('p');
        message.textContent = 'Error: ' + msg;
        message.style.cssText = 'font-weight: bold; font-size: 16px; margin-bottom: 10px;';
        
        var details = document.createElement('div');
        details.innerHTML = '<p>Line: ' + line + ':' + col + '</p><p>URL: ' + url + '</p>';
        details.style.color = '#333';
        
        if (error && error.stack) {
            var stack = document.createElement('pre');
            stack.textContent = error.stack;
            stack.style.cssText = 'background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 20px; overflow-x: auto; color: #475569; font-size: 12px;';
            details.appendChild(stack);
        }

        container.appendChild(title);
        container.appendChild(message);
        container.appendChild(details);
        document.body.appendChild(container);
        
        // Consoleにも出力
        console.error("Global Error Caught:", error);
        return false;
      };
      
      // Promiseの未処理エラーもキャッチ
      window.addEventListener('unhandledrejection', function(event) {
        window.onerror('Unhandled Promise Rejection: ' + event.reason, '', 0, 0, event.reason);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
